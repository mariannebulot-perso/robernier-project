<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marianne & Xavier</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Cormorant+Garamond:wght@300&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --red:#9E1B1B;
  --yellow:#F6D96B;
  --beige:#F3E6D6;
  --cream:#FFF8EE;
  --ink:#3e2a1f;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Cormorant Garamond',serif;
  background:var(--beige);
}

/* CURTAINS */
#stage{
  position:fixed;
  inset:0;
  z-index:10;
  cursor:pointer;
}

.curtain{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  transition:transform 2s cubic-bezier(.77,0,.18,1);
  box-shadow: inset 0 0 80px rgba(0,0,0,0.3);
}

.curtain-left{
  left:0;
  background:linear-gradient(90deg,#5c0f0f,var(--red));
}
.curtain-right{
  right:0;
  background:linear-gradient(-90deg,#5c0f0f,var(--red));
}

#stage.open .curtain-left{
  transform:translateX(-115%);
}
#stage.open .curtain-right{
  transform:translateX(115%);
}

/* SCENE */
#scene{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  opacity:0;
  transition:1.2s;
  background:radial-gradient(circle,var(--cream),var(--beige));
}
#scene.visible{opacity:1;}

/* ATMOSPHERE */
#scene::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.1)),
    url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.25;
  pointer-events:none;
}

/* CHATEAU */
#chateau{
  width:min(90vw,1000px);
  margin-bottom:2rem;
}

/* layers for depth */
.wall{fill:#e6d2b3;}
.shadow{fill:#d9c2a0;}
.roof{fill:#7b2a2a;}
.window{fill:#fff5e6;stroke:#8a6a4f;stroke-width:1}

/* TEXT */
#text{
  text-align:center;
  color:var(--ink);
  z-index:2;
}

.top-line{
  letter-spacing:.4em;
  font-size:.65rem;
  margin-bottom:1rem;
  opacity:.7;
}

/* NAMES */
.names{
  font-family:'Playfair Display',serif;
  font-size:3.5rem;
}

/* AMPERSAND */
.amp{
  font-family:'Great Vibes',cursive;
  color:var(--red);
  font-size:2.8rem;
}

/* MAIN TITLE */
.save{
  margin-top:.8rem;
  font-size:1.2rem;
  letter-spacing:.35em;
  color:var(--red);
}

/* DATE */
.date{
  margin-top:1rem;
  letter-spacing:.2em;
  font-size:.85rem;
}

/* PLACE */
.place{
  margin-top:.5rem;
  font-size:.8rem;
  opacity:.6;
}

</style>
</head>

<body>

<!-- CURTAINS -->
<div id="stage">
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
</div>

<!-- SCENE -->
<div id="scene">

<!-- IMPROVED CASTLE -->
<svg id="chateau" viewBox="0 0 900 500">

<!-- shadows -->
<rect x="250" y="230" width="400" height="190" class="shadow"/>

<!-- main -->
<rect x="250" y="220" width="400" height="200" class="wall"/>

<!-- towers -->
<rect x="200" y="250" width="80" height="170" class="wall"/>
<rect x="620" y="250" width="80" height="170" class="wall"/>

<!-- roofs -->
<polygon points="200,250 240,170 280,250" class="roof"/>
<polygon points="620,250 660,170 700,250" class="roof"/>
<polygon points="250,220 450,150 650,220" class="roof"/>

<!-- windows -->
<rect x="320" y="260" width="40" height="50" class="window"/>
<rect x="450" y="260" width="40" height="50" class="window"/>
<rect x="380" y="310" width="40" height="50" class="window"/>

<!-- door -->
<rect x="420" y="330" width="60" height="90" class="window"/>

</svg>

<!-- TEXT -->
<div id="text">
  <div class="top-line">NOUS NOUS MARIONS</div>

  <div class="names">
    Marianne <span class="amp">&</span> Xavier
  </div>

  <div class="save">SAVE THE DATE</div>

  <div class="date">SAMEDI 29 MAI 2027</div>
  <div class="place">Quelque part en France</div>
</div>

</div>

<script>
let opened = false;

const stage = document.getElementById('stage');
const scene = document.getElementById('scene');

stage.addEventListener('click', () => {
  if(opened) return;
  opened = true;

  stage.classList.add('open');
  scene.classList.add('visible');

  setTimeout(()=>{
    stage.style.pointerEvents = 'none';
  }, 2000);
});
</script>

</body>
</html>
