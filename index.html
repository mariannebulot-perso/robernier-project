<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marianne & Xavier · 29 Mai 2027</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Dancing+Script:wght@400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red:#C2271C;
  --yellow:#F4D35E;
  --beige:#F5E9DA;
  --cream:#FFF7ED;
  --gold:#D4AF37;
}

html,body{
  height:100%;
  background:var(--beige);
  font-family:'Playfair Display',serif;
  color:#5a3e2b;
  overflow:hidden;
}

/* CURTAINS */
#stage{
  position:fixed; inset:0; z-index:20; cursor:pointer;
}
.curtain{
  position:absolute; top:0; height:100%; width:50%;
  transition:transform 1.8s cubic-bezier(.77,0,.18,1);
}
.curtain-left{
  left:0;
  background:linear-gradient(95deg,#7a1c1c,#C2271C,#d94a4a);
}
.curtain-right{
  right:0;
  background:linear-gradient(-95deg,#7a1c1c,#C2271C,#d94a4a);
}
#stage.open .curtain-left{ transform:translateX(-100%); }
#stage.open .curtain-right{ transform:translateX(100%); }

.stage-cta{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.stage-monogram{
  font-family:'Dancing Script',cursive;
  font-size:5rem;
  color:var(--yellow);
}
.stage-hint{
  margin-top:1rem;
  letter-spacing:.3em;
}

/* SCENE */
#scene{
  position:fixed; inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:3rem;
  background:radial-gradient(circle,#fff7ed,#f5e9da);
  opacity:0;
  transition:.8s;
}
#scene.visible{ opacity:1; }

/* CHATEAU */
#chateau{
  width:min(96vw,900px);
  max-height:60vh;
  margin-top:1.5rem;
}
#chateau .sk{
  fill:none;
  stroke:#c9a646;
  stroke-width:1.3;
  stroke-linecap:round;
}

/* TEXT */
#text-block{
  margin-top:2rem;
  text-align:center;
  opacity:0;
  transform:translateY(10px);
  transition:1s;
}
#text-block.visible{ opacity:1; transform:translateY(0); }

.names{
  font-family:'Dancing Script',cursive;
  font-size:3rem;
}
.amp{ color:var(--red); }

.save-the-date{
  color:var(--red);
  margin-top:.5rem;
  letter-spacing:.15em;
}

.date-line{ margin-top:.5rem; }

.mystery{
  margin-top:1rem;
  font-size:.8rem;
  opacity:.6;
}

/* SOUND */
#sound-btn{
  position:fixed;
  bottom:1rem; right:1rem;
  opacity:0;
}
#sound-btn.visible{ opacity:1; }

</style>
</head>

<body>

<!-- CURTAINS -->
<div id="stage">
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <div class="stage-cta">
    <div class="stage-monogram">M & X</div>
    <div class="stage-hint">OUVRIR</div>
  </div>
</div>

<!-- SCENE -->
<div id="scene">

<svg id="chateau" viewBox="0 0 800 340">

<!-- BUILDING -->
<g id="g-bldg-shell">
  <rect class="sk" x="300" y="120" width="200" height="140"/>
  <line class="sk" x1="300" y1="120" x2="500" y2="120"/>
  <line class="sk" x1="310" y1="110" x2="490" y2="110"/>
</g>

<!-- WINDOWS -->
<g id="g-bldg-win">
  <rect class="sk" x="330" y="150" width="30" height="30"/>
  <line class="sk" x1="330" y1="165" x2="360" y2="165"/>

  <rect class="sk" x="440" y="150" width="30" height="30"/>
  <line class="sk" x1="440" y1="165" x2="470" y2="165"/>
</g>

<!-- DOOR -->
<g id="g-door">
  <rect class="sk" x="380" y="220" width="40" height="50"/>
  <rect class="sk" x="372" y="215" width="56" height="60"/>
</g>

<!-- BALCONY -->
<g id="g-balcony">
  <line class="sk" x1="370" y1="210" x2="430" y2="210"/>
  <line class="sk" x1="380" y1="210" x2="380" y2="215"/>
  <line class="sk" x1="400" y1="210" x2="400" y2="215"/>
  <line class="sk" x1="420" y1="210" x2="420" y2="215"/>
</g>

</svg>

<div id="text-block">
  <div class="names">
    Marianne Bulot <span class="amp">&</span> Xavier Burghardt
  </div>
  <div class="save-the-date">Save the Date</div>
  <div class="date-line">Samedi 29 Mai 2027</div>
  <div class="mystery">Quelque part en France</div>
</div>

</div>

<button id="sound-btn">♩ Son</button>

<script>
let opened=false;

function openCurtains(){
  if(opened) return;
  opened=true;

  document.getElementById('stage').classList.add('open');
  document.getElementById('scene').classList.add('visible');

  setTimeout(()=>{
    document.getElementById('text-block').classList.add('visible');
    document.getElementById('sound-btn').classList.add('visible');
    document.getElementById('stage').style.pointerEvents='none';
  },1200);
}

document.getElementById('stage').onclick=openCurtains;
</script>

</body>
</html>
