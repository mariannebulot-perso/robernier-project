<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Marianne &amp; Xavier · 29 Mai 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #C93B1E;
      --yellow: #EDD82A;
      --beige:  #F5EDDA;
      --beige2: #E8D9BC;
      --ink:    #3A1A08;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--beige);
      font-family: 'Dancing Script', cursive;
      color: var(--ink);
    }

    /* ═══════════════════════════
       RIDEAUX
    ═══════════════════════════ */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 20;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tringle en haut */
    #stage::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg,
        #7A3A08 0%, #C93B1E 25%, #EDD82A 50%, #C93B1E 75%, #7A3A08 100%);
      z-index: 25;
    }

    .curtain {
      position: absolute;
      top: 0;
      height: 100%;
      width: 51%;
      transition: transform 2s cubic-bezier(0.77, 0, 0.18, 1);
      will-change: transform;
    }

    .curtain::before,
    .curtain::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      z-index: 1;
    }

    .curtain-left {
      left: 0;
      background: linear-gradient(95deg,
        #6B1208 0%, #9E2010 18%, #C93B1E 42%,
        #B03218 65%, #8A1E0E 84%, #6B1208 100%);
    }
    .curtain-left::before  { left: 28%;  background: rgba(255,255,255,0.05); }
    .curtain-left::after   { left: 58%;  background: rgba(0,0,0,0.12); }

    .curtain-right {
      right: 0;
      background: linear-gradient(-95deg,
        #6B1208 0%, #9E2010 18%, #C93B1E 42%,
        #B03218 65%, #8A1E0E 84%, #6B1208 100%);
    }
    .curtain-right::before { right: 28%; background: rgba(255,255,255,0.05); }
    .curtain-right::after  { right: 58%; background: rgba(0,0,0,0.12); }

    #stage.open .curtain-left  { transform: translateX(-103%); }
    #stage.open .curtain-right { transform: translateX(103%); }

    .stage-cta {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 22;
      text-align: center;
      pointer-events: none;
    }

    .stage-monogram {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      color: var(--yellow);
      text-shadow: 0 0 35px rgba(237,216,42,0.45);
      animation: breathe 3s ease-in-out infinite;
      line-height: 1;
    }

    .stage-hint {
      margin-top: 0.9em;
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.18em;
      color: rgba(245,237,218,0.7);
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.8;  transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.03); }
    }

    /* ═══════════════════════════
       SCÈNE PRINCIPALE
    ═══════════════════════════ */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vh, 2rem) 1rem;
      background: radial-gradient(ellipse 90% 80% at 50% 50%,
        var(--beige) 0%, var(--beige2) 100%);
      opacity: 0;
      transition: opacity 0.7s ease 0.5s;
      gap: clamp(0.4rem, 1.2vh, 1rem);
    }

    #scene.visible { opacity: 1; }

    /* ═══════════════════════════
       CHÂTEAU SVG
    ═══════════════════════════ */
    #chateau {
      width: min(92vw, 700px);
      height: auto;
      flex-shrink: 0;
    }

    #chateau .sk {
      fill: none;
      stroke: var(--red);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ═══════════════════════════
       TEXTE
    ═══════════════════════════ */
    #text-block {
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    #text-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .names {
      font-size: clamp(1.4rem, 4.5vw, 3rem);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .amp {
      color: var(--red);
      font-size: 1.15em;
      display: inline-block;
      margin: 0 0.1em;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      margin: 0.35em 0;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      display: block;
      width: clamp(35px, 9vw, 85px);
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .ornament-dot {
      width: 7px; height: 7px;
      background: var(--yellow);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .save-the-date {
      font-size: clamp(1.1rem, 3.2vw, 1.8rem);
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.04em;
    }

    .date-line {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      font-weight: 400;
      color: var(--ink);
      margin-top: 0.25em;
      opacity: 0.8;
    }

    .mystery {
      font-size: clamp(0.7rem, 1.6vw, 0.88rem);
      font-weight: 400;
      color: rgba(58,26,8,0.45);
      margin-top: 0.7em;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* ═══════════════════════════
       BOUTON SON
    ═══════════════════════════ */
    #sound-btn {
      position: fixed;
      bottom: 1.1rem;
      right: 1.2rem;
      background: none;
      border: 1px solid rgba(58,26,8,0.2);
      color: rgba(58,26,8,0.4);
      padding: 0.35rem 0.8rem;
      font-family: 'Dancing Script', cursive;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.5s ease, color 0.3s, border-color 0.3s;
      border-radius: 1px;
    }

    #sound-btn.visible { opacity: 1; }
    #sound-btn:hover {
      color: rgba(58,26,8,0.7);
      border-color: rgba(58,26,8,0.4);
    }

    @media (max-height: 560px) {
      html, body { overflow-y: auto; }
      #scene { position: relative; min-height: 100vh; }
    }
  </style>
</head>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   PIANO DOUX — synthèse Web Audio (ondes sinus)
   Mélodie lente et apaisante, ~54 BPM
═══════════════════════════════════════════════ */
let _ctx   = null;
let _on    = false;
let _timer = null;
let _master = null;

const F = {
  C3:130.81, D3:146.83, E3:164.81, F3:174.61,
  G3:196.00, A3:220.00, B3:246.94,
  C4:261.63, D4:293.66, E4:329.63, F4:349.23,
  G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, G5:783.99
};

const BPM  = 54;
const BEAT = 60 / BPM;

const RH = [
  ['E5', 0,   2.5], ['D5', 2.5, 1.5], ['C5', 4,   4],
  ['E5', 8,   2],   ['G5', 10,  1.5], ['E5', 11.5,1.5], ['D5', 13,  5],
  ['C5', 18,  2.5], ['B4', 20.5,1.5], ['A4', 22,  4],
  ['C5', 26,  2],   ['E5', 28,  1.5], ['D5', 29.5,1.5], ['C5', 31,  5],
  ['A4', 36,  2.5], ['B4', 38.5,1.5], ['C5', 40,  4],
  ['A4', 44,  2],   ['G4', 46,  1.5], ['F4', 47.5,1.5], ['E4', 49,  5],
  ['F4', 54,  2.5], ['G4', 56.5,1.5], ['A4', 58,  2],
  ['G4', 60,  1.5], ['F4', 61.5,1.5], ['E4', 63,  2],
  ['D4', 65,  1.5], ['C4', 66.5,7.5],
];

function buildLH(root, mid, top, start, bars) {
  const out = [];
  for (let b = 0; b < bars * 3; b += 3) {
    out.push(
      [root, start + b,        0.6],
      [mid,  start + b + 0.9,  0.6],
      [top,  start + b + 1.8,  0.6],
      [mid,  start + b + 2.4,  0.4]
    );
  }
  return out;
}

const LH = [
  ...buildLH('C3','E3','G3',  0, 6),
  ...buildLH('A3','C4','E4', 18, 6),
  ...buildLH('F3','A3','C4', 36, 6),
  ...buildLH('G3','B3','D4', 54, 6),
  ...buildLH('C3','E3','G3', 72, 2),
];

const LOOP_BEATS = 74;

function initAudio() {
  if (_ctx) return;
  _ctx = new (window.AudioContext || window.webkitAudioContext)();
  _master = _ctx.createGain();
  _master.gain.value = 0.85;
  const delay   = _ctx.createDelay(1.0);
  const fbGain  = _ctx.createGain();
  const wetGain = _ctx.createGain();
  delay.delayTime.value = 0.28;
  fbGain.gain.value     = 0.22;
  wetGain.gain.value    = 0.18;
  delay.connect(fbGain);
  fbGain.connect(delay);
  _master.connect(delay);
  delay.connect(wetGain);
  wetGain.connect(_ctx.destination);
  _master.connect(_ctx.destination);
}

function note(freq, when, durBeats, vol) {
  const durS = durBeats * BEAT;
  const g = _ctx.createGain();
  [[1, 1.0], [2, 0.18], [3, 0.06]].forEach(([mult]) => {
    const o = _ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * mult;
    o.connect(g);
    o.start(when);
    o.stop(when + durS * 5);
  });
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vol, when + 0.04);
  g.gain.setTargetAtTime(vol * 0.25, when + 0.05, 0.25);
  g.gain.exponentialRampToValueAtTime(0.0001, when + durS * 5);
  g.connect(_master);
}

function scheduleLoop(t0) {
  if (!_on) return;
  RH.forEach(([n, beat, dur]) => note(F[n], t0 + beat * BEAT, dur, 0.16));
  LH.forEach(([n, beat, dur]) => note(F[n], t0 + beat * BEAT, dur, 0.06));
  const next = t0 + LOOP_BEATS * BEAT;
  _timer = setTimeout(() => { if (_on) scheduleLoop(next); },
    (next - _ctx.currentTime - 0.5) * 1000);
}

function startPiano() {
  initAudio();
  if (_ctx.state === 'suspended') _ctx.resume();
  _on = true;
  scheduleLoop(_ctx.currentTime + 0.15);
}

function stopPiano() {
  _on = false;
  clearTimeout(_timer);
  if (_ctx) { _ctx.close(); _ctx = null; _master = null; }
}

/* ═══════════════════════════════════════════════
   ANIMATION SVG — stroke-dashoffset
═══════════════════════════════════════════════ */
function pathLen(el) {
  if (el.tagName === 'line') {
    const dx = el.x2.baseVal.value - el.x1.baseVal.value;
    const dy = el.y2.baseVal.value - el.y1.baseVal.value;
    return Math.sqrt(dx * dx + dy * dy);
  }
  return el.getTotalLength ? el.getTotalLength() : 300;
}

function drawGroup(id, delay, pxPerSec) {
  const g = document.getElementById(id);
  if (!g) return delay;
  const els = [...g.querySelectorAll('path, line')];
  let end = delay;
  els.forEach((el, i) => {
    const len = pathLen(el);
    const dur = Math.max(0.3, len / pxPerSec);
    const t   = delay + i * 0.08;
    if (t + dur > end) end = t + dur;
    el.style.strokeDasharray  = len;
    el.style.strokeDashoffset = len;
    el.style.transition = `stroke-dashoffset ${dur.toFixed(2)}s ease ${t.toFixed(2)}s`;
    requestAnimationFrame(() => { el.style.strokeDashoffset = 0; });
  });
  return end;
}

function runAnimation() {
  const plan = [
    ['g-drive',      0.0,  160],
    ['g-balu',       0.9,  380],
    ['g-gate',       1.5,  130],
    ['g-bldg-shell', 1.9,  320],
    ['g-tower-l',    2.4,  260],
    ['g-tower-r',    2.4,  260],
    ['g-bldg-win',   3.1,  200],
    ['g-door',       3.7,  140],
    ['g-trees',      4.0,  200],
    ['g-ground',     4.2,  340],
  ];
  let last = 0;
  plan.forEach(([id, delay, speed]) => {
    const e = drawGroup(id, delay, speed);
    if (e > last) last = e;
  });
  setTimeout(() => {
    document.getElementById('text-block').classList.add('visible');
  }, (last + 0.6) * 1000);
}

/* ═══════════════════════════════════════════════
   OUVERTURE DES RIDEAUX
═══════════════════════════════════════════════ */
let _opened = false;

function ouvrir() {
  if (_opened) return;
  _opened = true;
  startPiano();
  document.getElementById('stage').classList.add('open');
  document.getElementById('scene').classList.add('visible');
  setTimeout(runAnimation, 1000);
  setTimeout(() => {
    document.getElementById('sound-btn').classList.add('visible');
    document.getElementById('stage').style.display = 'none';
  }, 2500);
}

document.getElementById('stage').addEventListener('click',    ouvrir);
document.getElementById('stage').addEventListener('touchend', e => { e.preventDefault(); ouvrir(); });

document.getElementById('sound-btn').addEventListener('click', function () {
  if (_on) {
    stopPiano();
    this.textContent = '♩ Musique (off)';
  } else {
    startPiano();
    this.textContent = '♩ Musique';
  }
});
</script>
</body>
