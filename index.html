<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marianne & Xavier – Robernier</title>
<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f3e6d6;
  overflow:hidden;
}

/* Curtains */
#curtain-left, #curtain-right {
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background:#9E1B1B;
  z-index:20;
  transition: transform 2s ease;
}

#curtain-left { left:0; transform:translateX(0); }
#curtain-right { right:0; transform:translateX(0); }

/* Castle SVG */
#castle {
  position:absolute;
  top:15%;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  height:auto;
}

#castle path, #castle line, #castle polygon {
  stroke:#2c1f17;
  stroke-width:2;
  fill:none;
  stroke-dasharray: 4000;
  stroke-dashoffset: 4000;
  transition: stroke-dashoffset 6s linear;
}

/* Text */
#text {
  position:absolute;
  width:100%;
  text-align:center;
  top:75%;
  opacity:0;
  transition: opacity 2s ease;
}

.names { font-size:3rem; font-family:'Playfair Display', serif; color:#2c1f17; }
.save, .date { font-size:1.2rem; color:#F6D96B; margin-top:0.5rem; }
</style>
</head>
<body>

<!-- Curtains -->
<div id="curtain-left"></div>
<div id="curtain-right"></div>

<!-- Detailed Hand-Drawn SVG of Château de Robernier -->
<svg id="castle" viewBox="0 0 1000 600">
  <!-- Main walls -->
  <rect x="200" y="300" width="600" height="250" stroke="#2c1f17" fill="none"/>
  <!-- Towers -->
  <polygon points="200,300 220,200 240,300" stroke="#2c1f17" fill="none"/>
  <polygon points="780,300 800,200 820,300" stroke="#2c1f17" fill="none"/>
  <!-- Roofs -->
  <polygon points="300,300 400,180 500,300" stroke="#2c1f17" fill="none"/>
  <polygon points="500,300 600,180 700,300" stroke="#2c1f17" fill="none"/>
  <!-- Windows -->
  <line x1="250" y1="350" x2="250" y2="450" stroke="#2c1f17"/>
  <line x1="350" y1="350" x2="350" y2="450" stroke="#2c1f17"/>
  <line x1="450" y1="350" x2="450" y2="450" stroke="#2c1f17"/>
  <line x1="550" y1="350" x2="550" y2="450" stroke="#2c1f17"/>
  <line x1="650" y1="350" x2="650" y2="450" stroke="#2c1f17"/>
  <line x1="750" y1="350" x2="750" y2="450" stroke="#2c1f17"/>
</svg>

<!-- Text -->
<div id="text">
  <div class="names">Marianne & Xavier</div>
  <div class="save">SAVE THE DATE</div>
  <div class="date">SAMEDI 29 MAI 2027</div>
</div>

<script>
const leftCurtain = document.getElementById('curtain-left');
const rightCurtain = document.getElementById('curtain-right');
const castle = document.getElementById('castle');
const text = document.getElementById('text');

function startAnimation(){
  // slide curtains and keep pinned
  leftCurtain.style.transform = 'translateX(-100%)';
  rightCurtain.style.transform = 'translateX(100%)';
  leftCurtain.style.pointerEvents = 'none';
  rightCurtain.style.pointerEvents = 'none';

  // animate castle drawing
  const paths = castle.querySelectorAll('path, line, polygon, rect');
  paths.forEach((el, i)=>{
    setTimeout(()=>{
      el.style.strokeDashoffset = 0;
    }, i*200);
  });

  // reveal text after castle animation
  setTimeout(()=>{
    text.style.opacity = 1;
  }, 4000);
}

// start on click
document.body.addEventListener('click', startAnimation);
</script>

</body>
</html>
