<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Marianne &amp; Xavier · 29 Mai 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #B33A2C;
      --yellow: #E1B763;
      --gold:   #C29B3C;
      --dark:   #1C0E05;
      --cream:  #F2E8D7;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--cream);
    }

    /* CURTAINS — always open on sides */
    .curtain {
      position: absolute;
      top: 0;
      height: 100%;
      width: 51%;
      overflow: hidden;
    }

    .curtain-left {
      left: 0;
      transform: translateX(-103%);
      background: linear-gradient(95deg,
        #7B1E1B 0%, #B33A2C 40%, #E1B763 50%, #B33A2C 60%, #7B1E1B 100%);
    }

    .curtain-right {
      right: 0;
      transform: translateX(103%);
      background: linear-gradient(-95deg,
        #7B1E1B 0%, #B33A2C 40%, #E1B763 50%, #B33A2C 60%, #7B1E1B 100%);
    }

    /* MAIN SCENE */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vh, 2rem);
      background: radial-gradient(ellipse 80% 70% at 50% 55%,
        #2a1408 0%, #1C0E05 100%);
      opacity: 1;
      gap: clamp(0.5rem, 1.5vh, 1.2rem);
    }

    /* CHÂTEAU SVG */
    #chateau {
      width: min(92vw, 700px);
      height: auto;
      flex-shrink: 0;
    }

    #chateau .sk {
      fill: none;
      stroke: var(--yellow);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* TEXT BLOCK */
    #text-block {
      text-align: center;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .names {
      font-size: clamp(1.15rem, 4vw, 2.6rem);
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.04em;
      line-height: 1.35;
    }

    .amp {
      color: var(--red);
      font-style: italic;
      font-size: 1.15em;
      line-height: 1;
      display: inline-block;
      margin: 0 0.1em;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7em;
      margin: 0.4em 0;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      display: block;
      width: clamp(40px, 10vw, 90px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .ornament-diamond {
      color: var(--yellow);
      font-size: 0.45rem;
      opacity: 0.9;
    }

    .save-the-date {
      font-style: italic;
      font-size: clamp(0.95rem, 2.8vw, 1.5rem);
      color: var(--red);
      letter-spacing: 0.06em;
    }

    .date-line {
      font-size: clamp(0.6rem, 1.8vw, 0.85rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      margin-top: 0.3em;
      opacity: 0.85;
    }

    .mystery {
      font-size: clamp(0.52rem, 1.4vw, 0.68rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(242, 232, 215, 0.35);
      margin-top: 0.8em;
      font-style: italic;
    }
  </style>
</head>
<body>

<!-- CURTAINS -->
<div class="curtain curtain-left"></div>
<div class="curtain curtain-right"></div>

<!-- MAIN SCENE -->
<div id="scene">
  <svg id="chateau" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" aria-label="Illustration du château">
    <!-- Existing château SVG elements here (driveway, balustrade, building, towers, windows, door, trees, ground) -->
    <!-- Keep all previous paths, lines, groups with class="sk" -->
  </svg>

  <!-- Text reveal -->
  <div id="text-block">
    <div class="names">
      Marianne Bulot <span class="amp">&amp;</span> Xavier Burghardt
    </div>
    <div class="ornament">
      <span class="ornament-diamond">◆</span>
    </div>
    <div class="save-the-date">Save the Date</div>
    <div class="date-line">
      Samedi 29 Mai 2027 &nbsp;·&nbsp; Saturday, 29<sup>th</sup> May 2027
    </div>
    <div class="mystery">
      Quelque part en France &nbsp;·&nbsp; Somewhere in France
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   SVG DRAW ANIMATION — stroke-dashoffset
═══════════════════════════════════════════ */
function pathLen(el) {
  if (el.tagName === 'line') {
    const dx = el.x2.baseVal.value - el.x1.baseVal.value;
    const dy = el.y2.baseVal.value - el.y1.baseVal.value;
    return Math.sqrt(dx*dx + dy*dy);
  }
  return el.getTotalLength ? el.getTotalLength() : 300;
}

function armGroup(id) {
  const g = document.getElementById(id);
  if (!g) return [];
  const els = [...g.querySelectorAll('path, line, ellipse')];
  els.forEach(el => {
    const len = pathLen(el);
    el.style.strokeDasharray  = len;
    el.style.strokeDashoffset = len;
  });
  return els;
}

function drawGroup(id, delay, pxPerSec) {
  const els = armGroup(id);
  els.forEach((el, i) => {
    const len = pathLen(el);
    const dur = Math.max(0.35, len / pxPerSec);
    const t = delay + i * 0.09;
    el.style.transition = `stroke-dashoffset ${dur.toFixed(2)}s ease ${t.toFixed(2)}s`;
    requestAnimationFrame(() => { el.style.strokeDashoffset = 0; });
  });
}

function runDrawAnimation() {
  const plan = [
    ['g-drive',      0.0,  160],
    ['g-balu',       0.9,  380],
    ['g-gate',       1.5,  130],
    ['g-bldg-shell', 1.9,  320],
    ['g-tower-l',    2.4,  260],
    ['g-tower-r',    2.4,  260],
    ['g-bldg-win',   3.1,  200],
    ['g-door',       3.7,  140],
    ['g-trees',      4.0,  200],
    ['g-ground',     4.2,  340],
  ];

  plan.forEach(([id, delay, speed]) => drawGroup(id, delay, speed));
}

// Start drawing immediately
window.addEventListener('load', runDrawAnimation);
</script>

</body>
</html>
