<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marianne & Xavier</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --red:#9E1B1B;
  --yellow:#F6D96B;
  --beige:#F3E6D6;
  --ink:#2c1f17;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Inter',sans-serif;
  background:black;
}

/* ---------- INTRO (M & X) ---------- */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  cursor:pointer;
  transition:opacity 1s ease;
}

#intro.fade{
  opacity:0;
  pointer-events:none;
}

.monogram{
  font-family:'Great Vibes',cursive;
  font-size:6rem;
  color:var(--yellow);
  opacity:0;
  transform:scale(0.9);
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1; transform:scale(1);}
}

/* ---------- SCENE ---------- */
#scene{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.4)),
    url('castle.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transform:scale(1.05);
  transition:opacity 1.2s ease, transform 1.2s ease;
}

#scene.visible{
  opacity:1;
  transform:scale(1);
}

/* subtle cinematic grain */
#scene::after{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.2;
}

/* ---------- TEXT ---------- */
#text{
  position:relative;
  text-align:center;
  color:white;
  max-width:800px;
  padding:20px;
}

/* small top line */
.top{
  letter-spacing:.4em;
  font-size:.65rem;
  opacity:.8;
  margin-bottom:1rem;
}

/* names */
.names{
  font-family:'Playfair Display',serif;
  font-size:4.5rem;
  font-weight:500;
  line-height:1.1;
}

.amp{
  color:var(--red);
  font-family:'Great Vibes',cursive;
  font-size:3rem;
}

/* SAVE THE DATE = HERO */
.save{
  margin-top:1rem;
  font-size:1.2rem;
  letter-spacing:.5em;
  color:var(--yellow);
}

/* date */
.date{
  margin-top:1.5rem;
  font-size:.9rem;
  letter-spacing:.3em;
}

/* place */
.place{
  margin-top:.6rem;
  font-size:.8rem;
  opacity:.7;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="monogram">M & X</div>
</div>

<!-- MAIN SCENE -->
<div id="scene">
  <div id="text">
    <div class="top">NOUS NOUS MARIONS</div>

    <div class="names">
      Marianne <span class="amp">&</span> Xavier
    </div>

    <div class="save">SAVE THE DATE</div>

    <div class="date">SAMEDI 29 MAI 2027</div>
    <div class="place">Quelque part en France</div>
  </div>
</div>

<script>
const intro = document.getElementById('intro');
const scene = document.getElementById('scene');

intro.addEventListener('click', () => {
  intro.classList.add('fade');

  setTimeout(()=>{
    scene.classList.add('visible');
  }, 300);
});
</script>

</body>
</html>
