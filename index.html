<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Marianne &amp; Xavier · 29 Mai 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #C2271C;
      --yellow: #D9AE45;
      --gold:   #B8901E;
      --dark:   #0f0804;
      --cream:  #EFE3C8;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--cream);
    }

    /* ═══════════════════════════
       CURTAIN STAGE
    ═══════════════════════════ */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 20;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Gold top rail */
    #stage::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 7px;
      background: linear-gradient(90deg,
        #6B4E0A 0%, #C49A2E 20%, #D9AE45 50%, #C49A2E 80%, #6B4E0A 100%);
      z-index: 25;
    }

    .curtain {
      position: absolute;
      top: 0;
      height: 100%;
      width: 51%;
      transition: transform 1.9s cubic-bezier(0.77, 0, 0.18, 1);
      will-change: transform;
      overflow: hidden;
    }

    /* Fold shading lines */
    .curtain::before,
    .curtain::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: rgba(0,0,0,0.15);
      z-index: 1;
    }

    .curtain-left {
      left: 0;
      background: linear-gradient(95deg,
        #5C0E0E 0%, #8B1515 18%, #C2271C 40%,
        #A61F1F 62%, #881818 82%, #5C0E0E 100%);
    }
    .curtain-left::before  { left: 28%; }
    .curtain-left::after   { left: 58%; }

    .curtain-right {
      right: 0;
      background: linear-gradient(-95deg,
        #5C0E0E 0%, #8B1515 18%, #C2271C 40%,
        #A61F1F 62%, #881818 82%, #5C0E0E 100%);
    }
    .curtain-right::before { right: 28%; }
    .curtain-right::after  { right: 58%; }

    /* Curtain fabric sheen */
    .curtain-left::before  { background: rgba(255,255,255,0.04); }
    .curtain-right::before { background: rgba(255,255,255,0.04); }
    .curtain-left::after   { background: rgba(0,0,0,0.12); }
    .curtain-right::after  { background: rgba(0,0,0,0.12); }

    #stage.open .curtain-left  { transform: translateX(-103%); }
    #stage.open .curtain-right { transform: translateX(103%); }

    /* Center monogram & call to action */
    .stage-cta {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 22;
      text-align: center;
      pointer-events: none;
    }

    .stage-monogram {
      font-size: clamp(3.2rem, 9vw, 6.5rem);
      font-weight: 300;
      color: var(--yellow);
      letter-spacing: 0.1em;
      text-shadow: 0 0 40px rgba(217,174,69,0.4);
      animation: breathe 3s ease-in-out infinite;
      line-height: 1;
    }

    .stage-hint {
      margin-top: 1em;
      font-size: clamp(0.6rem, 1.8vw, 0.78rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(239,227,200,0.6);
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.82; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.025); }
    }

    /* ═══════════════════════════
       MAIN SCENE
    ═══════════════════════════ */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vh, 2rem) 1rem clamp(1rem, 3vh, 2rem);
      background: radial-gradient(ellipse 80% 70% at 50% 55%,
        #1c1006 0%, #0f0804 100%);
      opacity: 0;
      transition: opacity 0.7s ease 0.6s;
      gap: clamp(0.5rem, 1.5vh, 1.2rem);
    }

    #scene.visible { opacity: 1; }

    /* ═══════════════════════════
       CHÂTEAU SVG
    ═══════════════════════════ */
    #chateau {
      width: min(92vw, 700px);
      height: auto;
      flex-shrink: 0;
    }

    #chateau .sk {
      fill: none;
      stroke: var(--yellow);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ═══════════════════════════
       TEXT BLOCK
    ═══════════════════════════ */
    #text-block {
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    #text-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .names {
      font-size: clamp(1.15rem, 4vw, 2.6rem);
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.04em;
      line-height: 1.35;
    }

    .amp {
      color: var(--red);
      font-style: italic;
      font-size: 1.15em;
      line-height: 1;
      display: inline-block;
      margin: 0 0.1em;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7em;
      margin: 0.4em 0;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      display: block;
      width: clamp(40px, 10vw, 90px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .ornament-diamond {
      color: var(--yellow);
      font-size: 0.45rem;
      opacity: 0.9;
    }

    .save-the-date {
      font-style: italic;
      font-size: clamp(0.95rem, 2.8vw, 1.5rem);
      color: var(--red);
      letter-spacing: 0.06em;
    }

    .date-line {
      font-size: clamp(0.6rem, 1.8vw, 0.85rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      margin-top: 0.3em;
      opacity: 0.85;
    }

    .mystery {
      font-size: clamp(0.52rem, 1.4vw, 0.68rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(239, 227, 200, 0.35);
      margin-top: 0.8em;
      font-style: italic;
    }

    /* ═══════════════════════════
       SOUND TOGGLE
    ═══════════════════════════ */
    #sound-btn {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      background: none;
      border: 1px solid rgba(239,227,200,0.22);
      color: rgba(239,227,200,0.4);
      padding: 0.38rem 0.85rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.5s ease, color 0.3s, border-color 0.3s;
      border-radius: 1px;
    }

    #sound-btn.visible { opacity: 1; }
    #sound-btn:hover {
      color: rgba(239,227,200,0.75);
      border-color: rgba(239,227,200,0.45);
    }

    /* ═══════════════════════════
       SMALL SCREEN OVERFLOW
    ═══════════════════════════ */
    @media (max-height: 560px) {
      html, body { overflow-y: auto; }
      #scene { position: relative; min-height: 100vh; }
    }
  </style>

<script>
'use strict';

/* ═══════════════════════════════════════════
   PIANO  — Web Audio API synthesis
═══════════════════════════════════════════ */
let _ctx   = null;
let _on    = false;
let _timer = null;

// Frequencies (Hz)
const F = {
  C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
  C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25
};

const BPM   = 76;                         // gentle waltz tempo
const BEAT  = 60 / BPM;                  // seconds per beat

// ── Melody (right hand) — G major, romantic waltz feel ──────────────────
// [note, beat-start, beat-duration]
const RH = [
  // Phrase A
  ['D5', 0,   1.5], ['C5', 1.5, 0.75], ['B4', 2.25, 0.75],
  ['A4', 3,   1.5], ['G4', 4.5, 1.5],
  ['A4', 6,   0.75],['B4', 6.75,0.75], ['C5', 7.5, 0.75], ['D5', 8.25, 0.75],
  ['E5', 9,   1.5], ['D5', 10.5,0.75], ['C5', 11.25,0.75],
  ['B4', 12,  2.25],['A4', 14.25,0.75],
  ['G4', 15,  3],

  // Phrase B
  ['B4', 18,  1.5], ['A4', 19.5,0.75], ['G4', 20.25,0.75],
  ['F4', 21,  1.5], ['E4', 22.5,1.5],
  ['F4', 24,  0.75],['G4', 24.75,0.75],['A4', 25.5, 0.75],['B4', 26.25,0.75],
  ['C5', 27,  1.5], ['B4', 28.5,0.75], ['A4', 29.25,0.75],
  ['G4', 30,  2.25],['F4', 32.25,0.75],
  ['G4', 33,  3],
];

// ── Accompaniment (left hand) — waltz arpeggio ──────────────────────────
function lhChord(root, mid, top, startBeat, bars) {
  const notes = [];
  for (let b = 0; b < bars * 3; b += 3) {
    notes.push(
      [root, startBeat + b,        0.5],
      [mid,  startBeat + b + 0.75, 0.5],
      [top,  startBeat + b + 1.5,  0.5],
      [mid,  startBeat + b + 2.25, 0.5]
    );
  }
  return notes;
}

const LH = [
  ...lhChord('G3','B3','D4', 0,  3),  // G  (bars 1-3)
  ...lhChord('E3','G3','B3', 9,  2),  // Em
  ...lhChord('C3','E3','G3', 15, 1),  // C
  ...lhChord('G3','B3','D4', 18, 3),  // G  (bars 7-9)
  ...lhChord('C3','E3','G3', 27, 2),  // C
  ...lhChord('D3','F3','A3', 33, 1),  // D  (simplified — no F#)
];

const LOOP_BEATS = 36;

function piano(freq, when, durBeats, vol) {
  const o  = _ctx.createOscillator();
  const o2 = _ctx.createOscillator();
  const g  = _ctx.createGain();

  o.type       = 'triangle';
  o.frequency.value = freq;
  o2.type      = 'sine';
  o2.frequency.value = freq * 2.0005;  // slight octave for warmth

  const durS = durBeats * BEAT;
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vol, when + 0.01);
  g.gain.setTargetAtTime(vol * 0.45, when + 0.015, 0.07);
  g.gain.exponentialRampToValueAtTime(0.0001, when + durS * 3.5);

  o.connect(g); o2.connect(g); g.connect(_ctx.destination);
  o.start(when);  o.stop(when + durS * 4);
  o2.start(when); o2.stop(when + durS * 4);
}

function scheduleLoop(t0) {
  if (!_on) return;

  RH.forEach(([note, beat, dur]) => {
    piano(F[note], t0 + beat * BEAT, dur, 0.20);
  });
  LH.forEach(([note, beat, dur]) => {
    piano(F[note], t0 + beat * BEAT, dur, 0.08);
  });

  const next   = t0 + LOOP_BEATS * BEAT;
  const waitMs = (next - _ctx.currentTime - 0.4) * 1000;
  _timer = setTimeout(() => { if (_on) scheduleLoop(next); }, waitMs);
}

function startPiano() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  _on = true;
  scheduleLoop(_ctx.currentTime + 0.12);
}

function stopPiano() {
  _on = false;
  clearTimeout(_timer);
  if (_ctx) { _ctx.close(); _ctx = null; }
}


/* ═══════════════════════════════════════════
   SVG DRAW ANIMATION — stroke-dashoffset
═══════════════════════════════════════════ */
function pathLen(el) {
  if (el.tagName === 'line') {
    const dx = el.x2.baseVal.value - el.x1.baseVal.value;
    const dy = el.y2.baseVal.value - el.y1.baseVal.value;
    return Math.sqrt(dx * dx + dy * dy);
  }
  return el.getTotalLength ? el.getTotalLength() : 300;
}

function armGroup(id) {
  const g = document.getElementById(id);
  if (!g) return [];
  const els = [...g.querySelectorAll('path, line, ellipse')];
  els.forEach(el => {
    const len = pathLen(el);
    el.style.strokeDasharray  = len;
    el.style.strokeDashoffset = len;
  });
  return els;
}

function drawGroup(id, delay, pxPerSec) {
  const els = armGroup(id);
  let groupEnd = delay;
  els.forEach((el, i) => {
    const len = pathLen(el);
    const dur = Math.max(0.35, len / pxPerSec);
    const t   = delay + i * 0.09;
    if (t + dur > groupEnd) groupEnd = t + dur;
    el.style.transition = `stroke-dashoffset ${dur.toFixed(2)}s ease ${t.toFixed(2)}s`;
    requestAnimationFrame(() => { el.style.strokeDashoffset = 0; });
  });
  return groupEnd;
}

function runDrawAnimation() {
  // [group-id, delay (s), drawing-speed (px/s)]
  const plan = [
    ['g-drive',      0.0,  160],
    ['g-balu',       0.9,  380],
    ['g-gate',       1.5,  130],
    ['g-bldg-shell', 1.9,  320],
    ['g-tower-l',    2.4,  260],
    ['g-tower-r',    2.4,  260],
    ['g-bldg-win',   3.1,  200],
    ['g-door',       3.7,  140],
    ['g-trees',      4.0,  200],
    ['g-ground',     4.2,  340],
  ];

  let lastEnd = 0;
  plan.forEach(([id, delay, speed]) => {
    const end = drawGroup(id, delay, speed);
    if (end > lastEnd) lastEnd = end;
  });

  // Reveal text block after drawing completes
  setTimeout(() => {
    document.getElementById('text-block').classList.add('visible');
  }, (lastEnd + 0.5) * 1000);
}


/* ═══════════════════════════════════════════
   CURTAIN — click / tap to open
═══════════════════════════════════════════ */
let _opened = false;

function openCurtains() {
  if (_opened) return;
  _opened = true;

  startPiano();

  const stage = document.getElementById('stage');
  const scene = document.getElementById('scene');
  const btn   = document.getElementById('sound-btn');

  stage.classList.add('open');
  scene.classList.add('visible');

  // Start drawing once curtains are half-open
  setTimeout(runDrawAnimation, 950);

  // Show sound toggle & remove stage from pointer events
  setTimeout(() => {
    btn.classList.add('visible');
    stage.style.display = 'none';
  }, 2400);
}

document.getElementById('stage').addEventListener('click',    openCurtains);
document.getElementById('stage').addEventListener('touchend', e => { e.preventDefault(); openCurtains(); });


/* ═══════════════════════════════════════════
   SOUND BUTTON
═══════════════════════════════════════════ */
document.getElementById('sound-btn').addEventListener('click', function () {
  if (_on) {
    stopPiano();
    this.textContent = '♩ Son · Sound (off)';
  } else {
    startPiano();
    this.textContent = '♩ Son · Sound';
  }
});
</script>
