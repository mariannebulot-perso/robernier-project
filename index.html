<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marianne & Xavier</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --red:#9E1B1B;
  --yellow:#F6D96B;
  --ink:#2c1f17;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:'Inter',sans-serif;
  background:black;
}

/* ---------- INTRO ---------- */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  cursor:pointer;
  transition:opacity 1s ease;
}

#intro::after{
  content:"Cliquer pour entrer";
  position:absolute;
  bottom:40px;
  font-size:.8rem;
  opacity:.6;
}

#intro.fade{
  opacity:0;
  pointer-events:none;
}

.monogram{
  font-family:'Great Vibes',cursive;
  font-size:clamp(3rem,10vw,6rem);
  color:var(--yellow);
  opacity:0;
  transform:scale(0.9);
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1; transform:scale(1);}
}

/* ---------- SCENE ---------- */
#scene{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.4)),
    url('castle.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transform:scale(1.05);
  transition:opacity 1.2s ease, transform 1.2s ease;
}

#scene.visible{
  opacity:1;
  transform:scale(1);
  animation:slowZoom 20s ease forwards;
}

@keyframes slowZoom{
  from{background-size:100%;}
  to{background-size:110%;}
}

#scene::after{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.2;
}

/* ---------- TEXT ---------- */
#text{
  position:relative;
  text-align:center;
  color:white;
  max-width:800px;
  padding:20px;
  opacity:0;
  transform:translateY(20px);
  transition:opacity 1s ease .4s, transform 1s ease .4s;
}

#scene.visible #text{
  opacity:1;
  transform:translateY(0);
}

.top{
  letter-spacing:.4em;
  font-size:.65rem;
  opacity:.8;
  margin-bottom:1rem;
}

.names{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:500;
  line-height:1.1;
}

.amp{
  color:var(--red);
  font-family:'Great Vibes',cursive;
  font-size:3rem;
}

.save{
  margin-top:1rem;
  font-size:1.2rem;
  letter-spacing:clamp(.2em,1vw,.5em);
  color:var(--yellow);
}

.date{
  margin-top:1.5rem;
  font-size:.9rem;
  letter-spacing:.3em;
}

.place{
  margin-top:.6rem;
  font-size:.8rem;
  opacity:.7;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" tabindex="0" role="button" aria-label="Entrer">
  <div class="monogram">M & X</div>
</div>

<!-- MAIN -->
<main id="scene">
  <section id="text">
    <div class="top">NOUS NOUS MARIONS</div>

    <h1 class="names">
      Marianne <span class="amp">&</span> Xavier
    </h1>

    <div class="save">SAVE THE DATE</div>

    <div class="date">SAMEDI 29 MAI 2027</div>
    <div class="place">Quelque part en France</div>
  </section>
</main>

<script>
const intro = document.getElementById('intro');
const scene = document.getElementById('scene');

function enterSite(){
  intro.classList.add('fade');
  setTimeout(()=>{
    scene.classList.add('visible');
  },300);
}

// Click
intro.addEventListener('click', enterSite);

// Keyboard access
intro.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' || e.key === ' '){
    enterSite();
  }
});

// Auto الدخول after 2s
setTimeout(()=>{
  if(!scene.classList.contains('visible')){
    enterSite();
  }
},2000);
</script>

</body>
</html>
